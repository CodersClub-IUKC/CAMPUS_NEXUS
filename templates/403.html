<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Access Restricted</title>
  <style>
    body { font-family: Arial, sans-serif; margin: 0; background: #f4f6f9; color: #1f2d3d; }
    .card { max-width: 760px; margin: 64px auto; background: #fff; border: 1px solid #dce3ea; border-radius: 8px; padding: 28px; }
    h1 { margin-top: 0; font-size: 24px; }
    p { line-height: 1.5; }
  </style>
</head>
<body>
  <div class="card">
    <h1>You do not have permission to perform this action.</h1>
    <p>
      The action you attempted is restricted for your account role.
      Please go back and use the options available to you, or contact a guild admin/superuser for help.
    </p>
  </div>
</body>
</html>
